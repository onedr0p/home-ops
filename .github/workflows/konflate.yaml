---
# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: Konflate

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.event.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  KONFLATE_DOMAIN: konflate.turbo.ac

jobs:
  comment:
    name: Konflate - Comment
    runs-on: ubuntu-latest
    steps:
      - name: Fetch rendered summary
        id: fetch
        env:
          PR: ${{ github.event.pull_request.number }}
        run: |
          if status="$(curl -fsS --retry 10 --retry-delay 3 --retry-all-errors \
               -H 'Accept: text/markdown' \
               -o summary.md -w '%header{x-konflate-render-status}' \
               "https://${KONFLATE_DOMAIN}/api/prs/${PR}/summary")" \
             && [ -s summary.md ]; then
            {
              echo "ready=true"
              echo "status=${status}"
            } >> "$GITHUB_OUTPUT"
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "konflate summary unavailable or empty — skipping; next push retries."
          fi

      - name: Load Secrets
        if: ${{ steps.fetch.outputs.ready == 'true' }}
        id: load-secrets
        uses: 1password/load-secrets-action@92467eb28f72e8255933372f1e0707c567ce2259 # v4.0.0 # zizmor: ignore[unpinned-tools]
        env:
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
          GITHUB_BOT_APP_CLIENT_ID: op://kubernetes/github-bot/GITHUB_BOT_APP_CLIENT_ID
          GITHUB_BOT_APP_PRIVATE_KEY: op://kubernetes/github-bot/GITHUB_BOT_APP_PRIVATE_KEY

      - name: Generate Token
        if: ${{ steps.fetch.outputs.ready == 'true' }}
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          client-id: ${{ steps.load-secrets.outputs.GITHUB_BOT_APP_CLIENT_ID }}
          private-key: ${{ steps.load-secrets.outputs.GITHUB_BOT_APP_PRIVATE_KEY }}
          permission-pull-requests: write

      - name: Find Comment
        if: ${{ steps.fetch.outputs.ready == 'true' }}
        id: find-comment
        uses: peter-evans/find-comment@b30e6a3c0ed37e7c023ccd3f1db5c6c0b0c23aad # v4.0.0
        with:
          token: ${{ steps.app-token.outputs.token }}
          issue-number: ${{ github.event.pull_request.number }}
          comment-author: ${{ steps.app-token.outputs.app-slug }}[bot]
          body-includes: "<!-- konflate"

      - name: Create or Update Comment
        if: ${{ steps.fetch.outputs.ready == 'true' }}
        uses: peter-evans/create-or-update-comment@e8674b075228eee787fea43ef493e45ece1004c9 # v5.0.0
        with:
          token: ${{ steps.app-token.outputs.token }}
          issue-number: ${{ github.event.pull_request.number }}
          comment-id: ${{ steps.find-comment.outputs.comment-id }}
          body-path: summary.md
          edit-mode: replace

      - name: Fail on render issue
        if: ${{ steps.fetch.outputs.ready == 'true' }}
        env:
          STATUS: ${{ steps.fetch.outputs.status }}
        run: |
          case "$STATUS" in
            ok)        echo "konflate render: ok" ;;
            failures)  echo "::error::konflate render: one or more resources failed to render"; exit 1 ;;
            error)     echo "::error::konflate render: render errored (no diff)"; exit 1 ;;
            *)         echo "::warning::konflate render: unexpected status '${STATUS}'" ;;
          esac

  success:
    if: ${{ !cancelled() }}
    needs: [comment]
    name: Konflate - Success
    runs-on: ubuntu-latest
    steps:
      - name: Any jobs failed?
        if: ${{ contains(needs.*.result, 'failure') }}
        run: exit 1

      - name: All jobs passed or skipped?
        if: ${{ !(contains(needs.*.result, 'failure')) }}
        env:
          RESULTS: ${{ toJSON(needs.*.result) }}
        run: echo "All jobs passed or skipped" && echo "$RESULTS"
