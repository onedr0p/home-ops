---
# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: Schemas

on:
  workflow_dispatch:
  schedule:
    - cron: 0 0 * * *
  push:
    branches:
      - main
    paths:
      - .github/workflows/schemas.yaml

permissions:
  contents: read

jobs:
  main:
    name: Schemas
    runs-on: home-ops-runner
    permissions:
      contents: read
      packages: write
    steps:
      - name: Load Secrets
        id: load-secrets
        uses: 1password/load-secrets-action@92467eb28f72e8255933372f1e0707c567ce2259 # v4.0.0
        env:
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
          CLOUDFLARE_ACCOUNT_TAG: op://kubernetes/cloudflare/CLOUDFLARE_ACCOUNT_TAG
          CLOUDFLARE_SCHEMA_TOKEN: op://kubernetes/cloudflare/CLOUDFLARE_SCHEMA_TOKEN

      - name: Install crd-schema-publisher
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          mkdir -p ~/.local/bin
          gh release download v2026.427.230454 --repo sholdee/crd-schema-publisher --pattern 'crd-schema-publisher-linux-amd64' --output ~/.local/bin/crd-schema-publisher --clobber
          chmod +x ~/.local/bin/crd-schema-publisher
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Run crd-schema-publisher
        env:
          CLOUDFLARE_API_TOKEN: ${{ steps.load-secrets.outputs.CLOUDFLARE_SCHEMA_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ steps.load-secrets.outputs.CLOUDFLARE_ACCOUNT_TAG }}
          CF_PAGES_PROJECT: kubernetes-schemas
        run: |-
          mkdir -p "$RUNNER_TEMP/crd-schemas"
          crd-schema-publisher run --output-dir "$RUNNER_TEMP/crd-schemas"
