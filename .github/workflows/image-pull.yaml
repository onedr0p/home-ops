---
# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: Image Pull

on:
  pull_request:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.event.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  filter:
    name: Image Pull - Filter
    runs-on: ubuntu-latest
    outputs:
      changed-files: ${{ steps.changed-files.outputs.changed_files }}
    steps:
      - name: Get Changed Files
        id: changed-files
        uses: bjw-s-labs/action-changed-files@a9a36fb08ce06db9b02fbd8026cc2c0945eb9841 # v0.6.0
        with:
          patterns: kubernetes/**/*

  extract:
    if: ${{ needs.filter.outputs.changed-files != '[]' }}
    needs: filter
    name: Image Pull - Extract Images
    runs-on: ubuntu-latest
    outputs:
      images: ${{ steps.extract.outputs.images }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup Mise
        uses: jdx/mise-action@dba19683ed58901619b14f395a24841710cb4925 # v4.1.0
        with:
          cache: false
          tool_versions: |
            github:home-operations/flate 0.2.12

      - name: Extract Images
        id: extract
        run: |
          echo 'images<<EOF' >> $GITHUB_OUTPUT
          flate diff images -p ./kubernetes/flux/cluster -o json >> $GITHUB_OUTPUT
          echo 'EOF' >> $GITHUB_OUTPUT

  pull:
    if: ${{ needs.extract.outputs.images != '[]' }}
    needs: extract
    name: Image Pull - Pull Images
    runs-on: ${{ github.event.repository.name }}-runner
    strategy:
      matrix:
        image: ${{ fromJSON(needs.extract.outputs.images) }}
      max-parallel: 4
      fail-fast: false
    steps:
      - name: Setup Mise
        uses: jdx/mise-action@dba19683ed58901619b14f395a24841710cb4925 # v4.1.0
        with:
          cache: false
          tool_versions: |
            talosctl latest

      - name: Pull Image
        env:
          IMAGE: ${{ matrix.image }}
        run: talosctl --nodes "$NODE" image pull "$IMAGE"

  success:
    if: ${{ !cancelled() }}
    needs: pull
    name: Image Pull - Success
    runs-on: ubuntu-latest
    steps:
      - name: Any jobs failed?
        if: ${{ contains(needs.*.result, 'failure') }}
        run: exit 1

      - name: All jobs passed or skipped?
        if: ${{ !(contains(needs.*.result, 'failure')) }}
        env:
          RESULTS: ${{ toJSON(needs.*.result) }}
        run: echo "All jobs passed or skipped" && echo "$RESULTS"
