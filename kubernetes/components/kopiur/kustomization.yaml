---
# yaml-language-server: $schema=https://json.schemastore.org/kustomization
apiVersion: kustomize.config.k8s.io/v1alpha1
kind: Component
# Full kopiur lifecycle for an app (the volsync component analog): a deploy-or-restore
# PVC + passive Restore populator, plus the BackupConfig + BackupSchedule. Compose on an
# app via its ks.yaml `components:` + postBuild substitute APP=<app>; point the app's
# `existingClaim` at ${APP}.
#
# The Restore populator uses a privileged (root) mover so it can write a freshly
# provisioned PVC and restore files with their ORIGINAL uid/gid. The workload namespace
# MUST opt in: annotate it kopiur.home-operations.com/privileged-movers=true.
resources:
  - ./backupconfig.yaml
  - ./backupschedule.yaml
  - ./pvc.yaml
  - ./restore.yaml
