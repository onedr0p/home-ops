---
# yaml-language-server: $schema=https://json.schemastore.org/kustomization
apiVersion: kustomize.config.k8s.io/v1alpha1
kind: Component
# Deploy-or-restore volume for GREENFIELD kopiur-only apps (the ReplicationDestination
# analog). Compose with ../kopiur (the backup recipe) + postBuild substitute APP=<app>.
#
# WARNING: kopiur 0.1.11 has NO mover UID control on Restore (restore mover runs as
# UID 65532), so restored files are owned by 65532. Only use this for apps whose data
# tolerates 65532 (e.g. fresh/greenfield). Apps that run as another UID (e.g. 1000)
# must keep volsync for restore until kopiur exposes a restore mover securityContext.
resources:
  - ./pvc.yaml
  - ./restore.yaml
