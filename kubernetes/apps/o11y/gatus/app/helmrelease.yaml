---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: gatus
spec:
  chartRef:
    kind: OCIRepository
    name: gatus
  interval: 1h
  values:
    fullnameOverride: gatus
    deploymentAnnotations:
      reloader.stakater.com/auto: "true"
    gatus:
      delayStartSeconds: "5"
      env:
        TZ: America/New_York
      envFrom:
        - secretRef:
            name: gatus-secret
      resources:
        requests:
          cpu: 100m
        limits:
          memory: 256Mi
    sidecar:
      kinds:
        httproute:
          enable: true
          auto: true
        service:
          enable: true
      resources:
        requests:
          cpu: 10m
        limits:
          memory: 128Mi
    httpRoute:
      enabled: true
      annotations:
        gatus.home-operations.com/enabled: "false"
      hostnames:
        - "{{ .Release.Name }}.turbo.ac"
        - status.turbo.ac
      parentRefs:
        - name: envoy-external
          namespace: network
    monitoring:
      serviceMonitor:
        enabled: true
    config:
      existingConfigMap: gatus-configmap
      items:
        - key: config.yaml
          path: config.yaml
        - key: buddy.yaml
          path: buddy.yaml
    persistence:
      enabled: true
      storageClass: ceph-block
      accessMode: ReadWriteOnce
      size: 5Gi
