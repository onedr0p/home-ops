---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: victoria-logs
spec:
  chartRef:
    kind: OCIRepository
    name: victoria-logs
  interval: 1h
  values:
    dashboards:
      enabled: true
    server:
      fullnameOverride: victoria-logs
      image:
        registry: quay.io
      persistentVolume:
        enabled: true
        storageClassName: ceph-block
        size: 50Gi
      retentionPeriod: 90d
      route:
        enabled: true
        hostnames:
          - vlogs.turbo.ac
        parentRefs:
          - name: envoy-internal
            namespace: network
      serviceMonitor:
        enabled: true
