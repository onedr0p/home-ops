---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kopiur
spec:
  chartRef:
    kind: OCIRepository
    name: kopiur
  interval: 1h
  values:
    installScope: cluster
    webhook:
      certManager:
        enabled: true
      serviceMonitor:
        enabled: true
    metrics:
      serviceMonitor:
        enabled: true
      prometheusRule:
        enabled: true
    grafanaDashboard:
      enabled: true
