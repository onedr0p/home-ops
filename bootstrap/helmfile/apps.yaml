---
# yaml-language-server: $schema=https://json.schemastore.org/helmfile
bases:
  - _defaults.yaml
---
# yaml-language-server: $schema=https://json.schemastore.org/helmfile
helmDefaults:
  cleanupOnFail: true
  forceConflicts: true
  wait: true
  waitForJobs: true

releases:
  - name: cilium
    namespace: kube-system
    inherit:
      - template: default
    hooks:
      - # Wait for CRDs to be available
        command: kubectl
        args:
          - wait
          - --for=create
          - crd/ciliumbgpadvertisements.cilium.io
          - crd/ciliumbgpclusterconfigs.cilium.io
          - crd/ciliumbgppeerconfigs.cilium.io
          - crd/ciliumloadbalancerippools.cilium.io
          - --timeout=2m
        events:
          - postsync
        showlogs: true
      - # Apply Resources
        command: kubectl
        args:
          - apply
          - --namespace={{ .Release.Namespace }}
          - --server-side
          - --force-conflicts
          - --filename=../../kubernetes/apps/{{ .Release.Namespace }}/{{ .Release.Name }}/app/networking.yaml
        events:
          - postsync
        showlogs: true

  - name: coredns
    namespace: kube-system
    inherit:
      - template: default
    needs:
      - kube-system/cilium

  - name: spegel
    namespace: kube-system
    inherit:
      - template: default
    needs:
      - kube-system/coredns

  - name: cert-manager
    namespace: cert-manager
    inherit:
      - template: default
    needs:
      - kube-system/spegel

  - name: external-secrets
    namespace: external-secrets
    inherit:
      - template: default
    needs:
      - cert-manager/cert-manager

  - name: onepassword-connect
    namespace: external-secrets
    inherit:
      - template: default
    hooks:
      - # Wait for CRDs to be available
        command: kubectl
        args:
          - wait
          - --for=create
          - crd/clustersecretstores.external-secrets.io
          - --timeout=2m
        events:
          - postsync
        showlogs: true
      - # Apply Resources
        command: kubectl
        args:
          - apply
          - --server-side
          - --force-conflicts
          - --filename=../../kubernetes/apps/{{ .Release.Namespace }}/{{ .Release.Name }}/app/clustersecretstore.yaml
        events:
          - postsync
        showlogs: true
    needs:
      - external-secrets/external-secrets

  - name: flux-operator
    namespace: flux-system
    inherit:
      - template: default
    needs:
      - external-secrets/onepassword-connect

  - name: flux-instance
    namespace: flux-system
    inherit:
      - template: default
    needs:
      - flux-system/flux-operator
